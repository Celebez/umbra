name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Umbra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests
        # Engine tests run automatically when UMBRA_ENGINE_BIN points at a
        # built umbra-engine binary; otherwise they skip gracefully.
        run: pytest -v
