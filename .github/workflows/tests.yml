name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Obscura engine
        run: |
          curl -fsSL "https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-linux.tar.gz" -o /tmp/obscura.tar.gz
          tar xzf /tmp/obscura.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/obscura /usr/local/bin/obscura-worker
      - name: Install Umbra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests
        run: pytest -v
