name: release

# Builds the Umbra engine binary (Rust + V8) from `engine/` in THIS repo and
# publishes it to Celebez/umbra releases. Fully self-contained: no dependency on
# any upstream repo at release time.
#
# NOTE: only Linux x86_64 is built here. Termux/Android users build the engine
# themselves on-device (see README "Build on Termux") — the V8 engine does not
# cross-compile cleanly for aarch64-linux-android in CI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: umbra-engine-x86_64-linux.tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build engine binary
        working-directory: engine
        run: cargo build --release --target ${{ matrix.target }} --bin obscura

      - name: Package
        run: |
          BIN=engine/target/${{ matrix.target }}/release/obscura
          mv "$BIN" "$(dirname "$BIN")/umbra-engine"
          tar czf "${{ matrix.asset }}" -C "$(dirname "$BIN")" umbra-engine

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  python:
    name: python package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
